<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>冷门旅游城市大转盘</title>
<link rel="manifest" href="/travel-roulette/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="大转盘">
<meta name="theme-color" content="#f5f0ea">
<link rel="icon" type="image/svg+xml" href="/travel-roulette/icon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f0ea;color:#5d5248;min-height:100vh;overflow-x:hidden}
.bg-particles{position:fixed;inset:0;pointer-events:none;z-index:0;background:linear-gradient(180deg,#f2ebe3 0%,#f8f4ef 50%,#ede4d9 100%)}
.main-container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:30px 20px}
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:2.4em;background:linear-gradient(135deg,#c49b8c,#d4a899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;letter-spacing:4px}
.header .subtitle{color:#a6988a;font-size:.9em;letter-spacing:2px}
.wheel-section{display:flex;flex-direction:column;align-items:center}
.wheel-wrapper{position:relative;width:520px;height:520px}
.pointer{position:absolute;top:-18px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-top:36px solid #c49b8c;filter:drop-shadow(0 2px 6px rgba(180,140,120,0.4))}
.pointer::after{content:'';position:absolute;top:-42px;left:-8px;width:16px;height:16px;background:#c49b8c;border-radius:50%}
#wheelCanvas{border-radius:50%;box-shadow:0 0 60px rgba(180,140,120,0.12),0 0 0 6px #e0d5c7;transition:box-shadow .5s}
#wheelCanvas.spinning{box-shadow:0 0 80px rgba(180,140,120,0.25),0 0 0 6px #d4c8b8}
.spin-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;width:90px;height:90px;border-radius:50%;border:3px solid #c49b8c;background:linear-gradient(135deg,#f7f3ed,#ede4d9);color:#c49b8c;font-size:1.3em;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.spin-btn:hover{background:linear-gradient(135deg,#ede4d9,#e5d5c5);box-shadow:0 6px 30px rgba(180,140,120,0.25);transform:translate(-50%,-50%) scale(1.05)}
.spin-btn:active{transform:translate(-50%,-50%) scale(.95)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
.refresh-btn{margin-top:16px;padding:10px 24px;border:1px solid #d9cdbf;border-radius:10px;background:transparent;color:#a6988a;cursor:pointer;font-size:.9em;transition:all .2s;letter-spacing:1px}
.refresh-btn:hover{border-color:#c49b8c;color:#c49b8c}

/* Result */
.result-panel{display:none;margin-top:40px;background:#faf7f2;border-radius:20px;padding:36px;border:1px solid #e5dbcf;animation:slideUp .5s ease;box-shadow:0 4px 24px rgba(0,0,0,0.04)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.result-panel.show{display:block}
.result-city-name{font-size:2em;font-weight:700;text-align:center;background:linear-gradient(135deg,#c49b8c,#a3b5a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.result-province{text-align:center;color:#8a7e72;margin-bottom:24px;line-height:1.7}
.result-best-season{text-align:center;color:#a6988a;font-size:.85em;margin-bottom:20px}
.result-best-season strong{color:#c49b8c}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
.info-card{background:#fdfbf8;border-radius:14px;padding:20px;border:1px solid #e8e0d5}
.info-card h3{font-size:1em;color:#c49b8c;margin-bottom:12px;letter-spacing:1px}
.info-card ul{list-style:none;padding:0}
.info-card li{padding:5px 0;font-size:.9em;color:#6b6056}
.info-card li::before{content:'• ';color:#c49b8c}
.info-card li span.tag{display:inline-block;font-size:.7em;padding:1px 6px;border-radius:4px;background:#e8d5cb;color:#b88574;margin-left:6px;vertical-align:middle}

/* Duration */
.duration-section{margin-top:24px;text-align:center}
.duration-section h3{font-size:.95em;color:#a6988a;margin-bottom:14px;letter-spacing:1px}
.duration-options{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.duration-btn{padding:10px 20px;border-radius:10px;border:1px solid #d9cdbf;background:#fdfbf8;color:#6b6056;cursor:pointer;font-size:.9em;transition:all .2s}
.duration-btn:hover{border-color:#c49b8c;color:#c49b8c}
.duration-btn.selected{background:#e8d5cb;border-color:#c49b8c;color:#b88574}
.custom-days{display:flex;gap:8px;align-items:center;justify-content:center}
.custom-days input{width:50px;padding:8px;text-align:center;background:#fdfbf8;border:1px solid #d9cdbf;border-radius:8px;color:#5d5248;font-size:.9em}
.custom-days span{color:#a6988a;font-size:.85em}
.generate-btn{margin-top:16px;padding:12px 40px;border:none;border-radius:12px;background:linear-gradient(135deg,#c49b8c,#b88574);color:#fff;font-size:1em;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s}
.generate-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(180,140,120,0.3)}
.generate-btn:active{transform:scale(.97)}

/* Document */
.doc-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(70,60,50,0.8);overflow-y:auto}
.doc-overlay.show{display:block}
.doc-container{max-width:820px;margin:40px auto;background:#faf7f2;color:#4a423b;border-radius:12px;overflow:hidden;animation:slideUp .4s ease;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.doc-header{background:linear-gradient(135deg,#4a423b,#5d5248);color:#f5f0ea;padding:30px 40px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:12px}
.doc-header h2{font-size:1.5em}
.doc-actions{display:flex;gap:10px}
.doc-actions button{padding:8px 18px;border:1px solid rgba(255,255,255,0.25);border-radius:8px;background:transparent;color:#f5f0ea;cursor:pointer;font-size:.85em;transition:all .2s}
.doc-actions button:hover{background:rgba(255,255,255,0.08)}
.doc-actions .save-btn{background:#c49b8c;border-color:#c49b8c;color:#fff;font-weight:600}
.doc-actions .save-btn:hover{background:#b88574}
.doc-body{padding:40px;background:#fdfbf8}
.doc-body h3{font-size:1.2em;color:#4a423b;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid #d9cdbf}
.doc-body h3:first-child{margin-top:0}
.doc-body .day-block{background:#f8f4ef;padding:20px 24px;border-radius:12px;margin:20px 0;border-left:5px solid #c49b8c}
.doc-body .day-block h4{color:#b88574;margin-bottom:12px;font-size:1.05em}
.doc-body .timeline-item{display:flex;gap:16px;margin:14px 0;align-items:flex-start}
.doc-body .timeline-time{min-width:70px;padding:4px 10px;background:#e8d5cb;border-radius:6px;text-align:center;font-size:.85em;color:#b88574;font-weight:600}
.doc-body .timeline-content{flex:1}
.doc-body .timeline-content strong{display:block;margin-bottom:4px}
.doc-body .timeline-content p{color:#7a6e62;font-size:.9em;line-height:1.6}
.doc-body .place-img{width:100%;height:240px;object-fit:cover;border-radius:10px;margin:8px 0;background:#ede4d9}
.doc-body .img-note{text-align:right;font-size:.72em;color:#b8a898;margin-top:-2px;margin-bottom:6px}
.doc-body .img-note a{color:#c49b8c;text-decoration:none}
.doc-body .img-note a:hover{text-decoration:underline}
.doc-body .food-list{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.doc-body .food-card{background:#f8f4ef;border-radius:10px;overflow:hidden;border:1px solid #e5dbcf}
.doc-body .food-card img{width:100%;height:160px;object-fit:cover;background:#ede4d9}
.doc-body .food-card .fi{padding:12px}
.doc-body .food-card .fi strong{display:block;margin-bottom:2px}
.doc-body .food-card .fi span{color:#8a7e72;font-size:.82em}
.tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
.tip-card{background:#f8f4ef;border-radius:10px;padding:14px 18px;border:1px solid #e5dbcf}
.tip-card strong{color:#4a423b;font-size:.9em}
.tip-card p{color:#7a6e62;font-size:.85em;margin-top:4px;line-height:1.5}
.doc-close{position:fixed;top:20px;right:30px;z-index:110;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:1.4em;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s}
.doc-close:hover{background:rgba(255,255,255,0.25)}
.doc-close.show{display:flex}
.photo-card:hover{transform:scale(1.02)!important;box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.install-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:60;background:#fdfbf8;border-top:1px solid #e5dbcf;padding:14px 20px;align-items:center;gap:12px;box-shadow:0 -2px 12px rgba(0,0,0,0.06)}
.install-banner.show{display:flex}
.install-text{flex:1;font-size:.88em;color:#5d5248;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.install-btn{padding:8px 18px;border:none;border-radius:8px;background:#c49b8c;color:#fff;font-size:.85em;font-weight:600;cursor:pointer;white-space:nowrap}
.install-close{background:none;border:none;color:#a6988a;font-size:1.1em;cursor:pointer;padding:4px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in-up{animation:fadeInUp .4s ease forwards}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;background:#a3b5a0;color:#fff;padding:12px 28px;border-radius:10px;font-weight:600;animation:fadeInUp .3s ease}
.qr-btn{display:none;position:fixed;top:16px;right:20px;z-index:50;width:44px;height:44px;border-radius:50%;background:#fdfbf8;border:1px solid #d9cdbf;cursor:pointer;font-size:1.3em;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:all .2s}
.qr-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,0.12);transform:scale(1.05)}
.qr-btn.show{display:flex}
.qr-modal{display:none;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.5);align-items:center;justify-content:center}
.qr-modal.show{display:flex}
.qr-modal-inner{background:#fdfbf8;border-radius:16px;padding:28px 32px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.qr-modal-inner h3{color:#5d5248;margin-bottom:14px}
.qr-modal-inner img{border-radius:8px}
.qr-url{color:#a6988a;font-size:.8em;margin-top:10px;word-break:break-all}
.qr-close{margin-top:14px;padding:8px 24px;border:none;border-radius:8px;background:#c49b8c;color:#fff;cursor:pointer;font-size:.9em}

@media(max-width:600px){
.wheel-wrapper{width:340px;height:340px}.spin-btn{width:66px;height:66px;font-size:1em}
.info-grid{grid-template-columns:1fr}.header h1{font-size:1.5em}
.doc-body .food-list,.tips-grid{grid-template-columns:1fr}
.doc-body{padding:20px}#wheelCanvas{width:340px;height:340px}
}
</style>
</head>
<body>

</div>

</div>
</div>
</div>
<div class="doc-overlay" id="docOverlay"><button class="doc-close" id="docClose">✕</button><div class="doc-container" id="docContainer"></div></div>

// ==================== UTILS ====================
function shuffle(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=r[i];r[i]=r[j];r[j]=t;}return r}
function pick20(){return shuffle(CITIES).slice(0,20)}

// ==================== DRAWING ====================
var SEG_COLORS=['#e8d5cb','#dfcdc0','#d9c8b8','#e0d4c4','#dccfc0','#e5d7c8','#ded0c2','#e2d3c4','#dbcbb8','#e6d8ca','#d8c6b5','#e3d2c0','#ddcebe','#e7d9cc','#dac8b6','#e1cfbd','#decdba','#e4d5c3','#d7c4b2','#e9dbce'];

function drawWheel(animP){
  ctx.clearRect(0,0,W,H);
  var N=currentCities.length;if(!N)return;
  var sa=(2*Math.PI)/N,prog=Math.min(1,Math.max(0,animP||0));

  for(var i=0;i<N;i++){
    var a0=wheelAngle+i*sa-Math.PI/2,a1=a0+sa;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,a0,a1);ctx.closePath();
    ctx.fillStyle=SEG_COLORS[i];ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(CX,CY,R+4,0,2*Math.PI);ctx.strokeStyle='#c49b8c';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,50,0,2*Math.PI);ctx.fillStyle='#f5f0ea';ctx.fill();ctx.strokeStyle='#c49b8c';ctx.lineWidth=2;ctx.stroke();

  for(var i2=0;i2<N;i2++){
    var d=wheelAngle+i2*sa-Math.PI/2;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+R*Math.cos(d),CY+R*Math.sin(d));
    ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;ctx.stroke();
  }

  for(var i3=0;i3<N;i3++){
    var ma=wheelAngle+i3*sa+sa/2-Math.PI/2,tr=R*0.68;
    var tx=CX+tr*Math.cos(ma),ty=CY+tr*Math.sin(ma);
    var cp=Math.max(0,Math.min(1,(prog*N-i3*0.7+0.3)/0.7));
    ctx.save();ctx.translate(tx,ty);ctx.rotate(ma+Math.PI/2);
    if(Math.cos(ma)<0)ctx.rotate(Math.PI);
    ctx.globalAlpha=cp;ctx.font='bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#4a423b';
    ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=3;ctx.scale(0.5+0.5*cp,0.5+0.5*cp);
    ctx.fillText(currentCities[i3].name,0,0);ctx.restore();
  }
}

var popInStart=0;
function animTextPopIn(ts){if(!popInStart)popInStart=ts;var p=Math.min(1,(ts-popInStart)/800);drawWheel(p);if(p<1)requestAnimationFrame(animTextPopIn);else textAnimProgress=1}
function startTextAnim(){popInStart=0;textAnimProgress=0;requestAnimationFrame(animTextPopIn)}

// ==================== SPIN ====================
var DUR=3200,spinBase=0,spinTR=0;
function easeOut(t){return 1-Math.pow(1-t,3)}
function doSpin(ts){
  if(!spinStartTime){spinStartTime=ts;spinBase=wheelAngle;spinTR=(6+Math.random()*3)*2*Math.PI}
  var el=ts-spinStartTime,t=Math.min(1,el/DUR),e=easeOut(t);
  wheelAngle=spinBase+spinTR*e;drawWheel(1);
  if(t>=1){wheelAngle=(spinBase+spinTR)%(2*Math.PI);drawWheel(1);$canvas.classList.remove('spinning');$spinBtn.disabled=false;isSpinning=false;onSpinComplete();return}
  animationId=requestAnimationFrame(doSpin);
}
function startSpin(){if(isSpinning||!currentCities.length)return;isSpinning=true;$spinBtn.disabled=true;$canvas.classList.add('spinning');$resultPanel.classList.remove('show');spinStartTime=0;animationId=requestAnimationFrame(doSpin)}

function onSpinComplete(){
  var N=currentCities.length,sa=(2*Math.PI)/N,best=0,bestD=Infinity;
	  for(var i=0;i<N;i++){var ca=wheelAngle+i*sa+sa/2-Math.PI/2;var df=ca+Math.PI/2;df=df-Math.floor((df+Math.PI)/(2*Math.PI))*(2*Math.PI);if(Math.abs(df)<bestD){bestD=Math.abs(df);best=i}}
  selectedCity=currentCities[best];showResult();
}
function showResult(){
  $resultPanel.classList.add('show');$resultCityName.textContent=selectedCity.name;
  $resultProvince.innerHTML=selectedCity.province+' · '+selectedCity.desc;
  $resultSeason.innerHTML='<strong>最佳旅行时间：</strong>'+selectedCity.bestSeason;
  $attractionsList.innerHTML=selectedCity.a.map(function(x){return'<li>'+x.n+'<span class="tag">'+x.t+'</span></li>'}).join('');
  $foodList.innerHTML=selectedCity.f.map(function(x){return'<li>'+x.n+' <span style="font-size:.8em;color:#888">'+x.d+'</span></li>'}).join('');
  $resultPanel.scrollIntoView({behavior:'smooth',block:'center'});
}

// ==================== ITINERARY ====================
var DAY_THEMES=['初识','深度探索','文化之旅','自然风光','舌尖寻味','休闲漫游','秘境探寻','时光漫步','山水之间','告别之旅'];

function buildItinerary(city,days,nights){
  var attrs=city.a.slice(),foods=city.f.slice();
  var plans=[],used=new Set();

  // Shuffle and use unique attractions
  attrs=shuffle(attrs);

  for(var d=0;d<days;d++){
    var morning='',afternoon='',evening='',foodRecs=[],theme=DAY_THEMES[d%DAY_THEMES.length];

    // Pick unique attractions for this day
    if(d*2<attrs.length)morning=attrs[d*2].n;
    else if(d<attrs.length)morning=attrs[d].n;
    else morning='自由探索'+city.name+'老城区/特色街巷';

    if(d*2+1<attrs.length)afternoon=attrs[d*2+1].n;
    else if(d+1<attrs.length)afternoon=attrs[d+1].n;
    else afternoon='沉浸式漫步'+city.name+'大街小巷，发现不期而遇的惊喜';

    // Food for this day
    var fs=(d*2)%foods.length;
    for(var f=0;f<2;f++)foodRecs.push(foods[(fs+f)%foods.length].n);
    if(foodRecs[0]===foodRecs[1]&&foods.length>2)foodRecs[1]=foods[(fs+2)%foods.length].n;

    // Evening - unique per day
    if(d===0)evening='抵达后稍作休整，逛当地夜市或美食街，感受'+city.name+'的城市烟火气';
    else if(d===days-1)evening='最后一晚，买些当地特产伴手礼，在'+city.name+'最好的餐厅享用一顿告别晚餐';
    else{var eves=['逛当地夜市，尝试街边小吃','去当地特色酒吧或茶馆小坐','在城区沿河边散步看夜景','去当地热闹的夜市或音乐广场','找一家有特色的咖啡馆看书发呆'];evening=eves[d%eves.length]}

    plans.push({d:d+1,theme:theme,morning:morning,afternoon:afternoon,evening:evening,food:foodRecs});
  }
  return plans;
}

  city.a.forEach(function(a){html+='<p><strong>'+a.n+'</strong> ['+a.t+']</p>\n'+photoCard(a.t+' '+a.n,a.n,800,300)+'\n'});
  html+='<h2>特色美食</h2>\n<div class="food-grid">\n';
  city.f.forEach(function(f){html+='<div class="fc">'+photoCardFood(f.n,f.n,400,200)+'<div><strong>'+f.n+'</strong><br><span style="color:#8a7e72;font-size:.85em">'+f.d+'</span></div></div>\n'});
  html+='</div>\n<h2>'+label+' 详细行程</h2>\n';
  itinerary.forEach(function(d){html+='<div class="day"><h3>Day '+d.d+'：'+d.theme+'</h3>\n<p><span class="time">上午</span><strong>'+d.morning+'</strong></p>\n<p><span class="time">中午</span>'+d.food.join('、')+'</p>\n<p><span class="time">下午</span><strong>'+d.afternoon+'</strong></p>\n<p><span class="time">晚上</span>'+d.evening+'</p>\n</div>\n'});
  html+='<p style="text-align:center;color:#b8a898;margin-top:30px">生成于 冷门旅游城市大转盘</p>\n</body>\n</html>';
  var b=new Blob([html],{type:'text/html;charset=UTF-8'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download=city.name+'_'+label+'_旅游攻略.html';a.click();URL.revokeObjectURL(u);toast('攻略已保存！');
}

function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2000)}

function refreshCities(){currentCities=pick20();textAnimProgress=0;drawWheel(0);startTextAnim()}

// ==================== EVENT BINDINGS ====================
// QR code for mobile access (only shown when served from local network)
(function(){
  var origin=window.location.origin;
  if(origin.indexOf('localhost')>=0||origin.match(/^https?:\/\/(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/)){
    var $qrBtn=document.getElementById('qrBtn');
    var $qrModal=document.getElementById('qrModal');
    var $qrImg=document.getElementById('qrImg');
    var $qrUrl=document.getElementById('qrUrl');
    var qrUrl=origin+window.location.pathname;
    $qrImg.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(qrUrl);
    $qrUrl.textContent=qrUrl;
    $qrBtn.classList.add('show');
    $qrBtn.addEventListener('click',function(){$qrModal.classList.add('show')});
    document.getElementById('qrClose').addEventListener('click',function(){$qrModal.classList.remove('show')});
    $qrModal.addEventListener('click',function(e){if(e.target===$qrModal)$qrModal.classList.remove('show')});
  }
})();

$spinBtn.addEventListener('click',function(){if(!isSpinning)startSpin()});
$refreshBtn.addEventListener('click',function(){if(isSpinning)return;refreshCities();$resultPanel.classList.remove('show');selectedCity=null});
$generateBtn.addEventListener('click',function(){if(!selectedCity)return;var it=buildItinerary(selectedCity,selectedDays,selectedNights);renderDoc(selectedCity,selectedDays,selectedNights,it)});
$docClose.addEventListener('click',function(){$docOverlay.classList.remove('show');$docClose.classList.remove('show');document.body.style.overflow=''});
$docOverlay.addEventListener('click',function(e){if(e.target===$docOverlay){$docOverlay.classList.remove('show');$docClose.classList.remove('show');document.body.style.overflow=''}});
document.addEventListener('keydown',function(e){if(e.code==='Space'&&!isSpinning&&document.body.style.overflow!=='hidden'){e.preventDefault();startSpin()}if(e.code==='Escape'){$docOverlay.classList.remove('show');$docClose.classList.remove('show');document.body.style.overflow=''}});
$durationOptions.addEventListener('click',function(e){var b=e.target.closest('.duration-btn');if(!b)return;document.querySelectorAll('.duration-btn').forEach(function(x){x.classList.remove('selected')});b.classList.add('selected');if(b.dataset.days==='custom'){$customDays.style.display='flex';selectedDays=parseInt($customDaysInput.value)||3;selectedNights=parseInt($customNightsInput.value)||2}else{$customDays.style.display='none';selectedDays=parseInt(b.dataset.days);selectedNights=parseInt(b.dataset.nights)}});
$customDaysInput.addEventListener('input',function(){selectedDays=parseInt($customDaysInput.value)||1});
$customNightsInput.addEventListener('input',function(){selectedNights=parseInt($customNightsInput.value)||0});

// ==================== INIT ====================
currentCities=pick20();drawWheel(0);startTextAnim();
})();
</script>
